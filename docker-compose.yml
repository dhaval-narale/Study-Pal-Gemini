version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: studypal-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Pass@1234}
      MYSQL_DATABASE: studypal
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-Pass@1234}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: studypal-ai
    restart: always
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studypal-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql:3306/studypal?createDatabaseIfNotExist=true
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-Pass@1234}
      - AI_SERVICE_URL=http://ai-service:8001
      - JWT_SECRET=${JWT_SECRET:-studypal_jwt_secret_key_change_in_production_32chars}
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studypal-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
