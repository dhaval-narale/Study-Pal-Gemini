spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/studypal?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Pass@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

ai.service.url=${AI_SERVICE_URL:http://localhost:8001}

jwt.secret=${JWT_SECRET:studypal_jwt_secret_key_change_in_production_32chars}
jwt.expiration=86400000
